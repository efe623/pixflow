<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="boxgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Icon box -->
  <rect x="10" y="20" width="80" height="80" rx="18" fill="url(#boxgrad)"/>

  <!-- Code brackets < > -->
  <text x="28" y="72" font-family="'SF Mono', 'Fira Code', monospace" font-size="36" font-weight="700" fill="white" opacity="0.95">&lt;/&gt;</text>

  <!-- Brand name -->
  <text x="108" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="white" letter-spacing="-0.5">the<tspan fill="url(#grad)">App</tspan>Business</text>

  <!-- Tagline -->
  <text x="110" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="400" fill="#8b949e" letter-spacing="0.5">Custom websites &amp; apps, built for you</text>
</svg>
